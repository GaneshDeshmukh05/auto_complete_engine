<!DOCTYPE html>
<html>
<head>
    <title>AutoComplete AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="toggle" onclick="toggleTheme()">🌙</button>

<div class="main">
    <h1 class="logo">AutoComplete AI</h1>

    <div class="search-box">
        <input 
            type="text" 
            id="search" 
            placeholder="Search..."
            onkeyup="fetchSuggestions()"
        />
        <span class="icon" onclick="startVoice()">🎤</span>
    </div>

    <div id="loader" class="loader"></div>

    <div id="suggestions" class="suggestions"></div>
</div>

<script src="script.js"></script>
</body>
</html>
